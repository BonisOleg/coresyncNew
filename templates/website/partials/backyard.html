       hx-get="{% url 'explore:panel' %}"
       hx-target="#explore-panel-content"
       hx-swap="innerHTML"
       role="button">
        &larr; Back
    </a>

    <h2 class="explore-content__title">Backyard</h2>

        Members will enter it first.

    <button class="cta-btn" data-action="open-concierge" data-context="backyard" type="button">
        Get early access
    </button>
</div>
