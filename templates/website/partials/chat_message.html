<!-- Single chat message response (appended to #concierge-messages via HTMX) -->

<div class="chat-msg chat-msg--assistant">
    {{ assistant_message.content }}

    {% if ui_data.buttons %}
        <div class="chat-buttons">
            {% for btn in ui_data.buttons %}
                <button class="chat-btn"
                        data-action="{{ btn.action }}"
                        {% if btn.flow_step %}data-flow-step="{{ btn.flow_step }}"{% endif %}
                        {% if btn.value %}data-value="{{ btn.value }}" data-field="{{ btn.field_name }}"{% endif %}
                        type="button">
                    {{ btn.label }}
                </button>
            {% endfor %}
        </div>
    {% elif metadata.buttons %}
        <div class="chat-buttons">
            {% for btn in metadata.buttons %}
                <button class="chat-btn"
                        data-action="{{ btn.action }}"
                        {% if btn.flow_step %}data-flow-step="{{ btn.flow_step }}"{% endif %}
                        type="button">
                    {{ btn.label }}
                </button>
            {% endfor %}
        </div>
    {% endif %}

    {% if metadata.images %}
        <div class="chat-images">
            {% for img in metadata.images %}
                <img class="chat-images__img" src="{{ img.url }}" alt="{{ img.title }}" loading="lazy">
            {% endfor %}
        </div>
    {% endif %}
</div>
