# Render Blueprint for CoreSync Private
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: coresync-private
    runtime: python
    plan: starter
    buildCommand: './build.sh'
    startCommand: 'python -m gunicorn project.asgi:application -k uvicorn.workers.UvicornWorker'
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.5"
      - key: DJANGO_SETTINGS_MODULE
        value: project.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: WEB_CONCURRENCY
        value: "4"
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: coresync-db
          property: connectionString
      # Gemini — verify model name at aistudio.google.com
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      # Atlas.AI
      - key: ATLAS_API_KEY
        sync: false
      - key: ATLAS_WEBHOOK_SECRET
        sync: false
      - key: ATLAS_AGENT_ID
        sync: false
      # Cal.com
      - key: CALCOM_API_KEY
        sync: false
      - key: CALCOM_WEBHOOK_SECRET
        sync: false
      # Cloudinary
      - key: CLOUDINARY_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # Gmail SMTP
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: EMAIL_USE_TLS
        value: "True"
      # Stripe (prepared)
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # WhatsApp
      - key: WHATSAPP_NUMBER
        sync: false
    healthCheckPath: /healthz/

databases:
  - name: coresync-db
    plan: starter
    databaseName: coresync
