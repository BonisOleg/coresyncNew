# Render Blueprint for CoreSync Private
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: coresync-private
    runtime: python
    plan: starter
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate --noinput
    startCommand: gunicorn project.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: project.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: coresync-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.13.5"
      # Gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3-flash
      # Atlas.AI
      - key: ATLAS_API_KEY
        sync: false
      - key: ATLAS_WEBHOOK_SECRET
        sync: false
      - key: ATLAS_AGENT_ID
        sync: false
      # Cal.com
      - key: CALCOM_API_KEY
        sync: false
      - key: CALCOM_WEBHOOK_SECRET
        sync: false
      # Cloudinary
      - key: CLOUDINARY_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # Gmail SMTP
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      # Stripe (prepared)
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # WhatsApp
      - key: WHATSAPP_NUMBER
        sync: false
    healthCheckPath: /healthz/

databases:
  - name: coresync-db
    plan: starter
    databaseName: coresync
